<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="{{ '/stylesheets/stylesheet.css' | relative_url }}?v=4">
    <title>{{ page.title | default: site.title }} | {{ site.title }}</title>
  </head>

  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="GAP packages home">
          <picture>
            <source
              media="(prefers-color-scheme: dark)"
              srcset="{{ '/assets/logo/dark/gaplogo.svg' | relative_url }}">
            <img
              class="site-logo"
              src="{{ '/assets/logo/light/gaplogo.svg' | relative_url }}"
              alt="GAP logo">
          </picture>
          <span class="site-name">GAP packages</span>
        </a>

        <nav class="site-nav" aria-label="Primary navigation">
          <a class="nav-link{% if page.url == '/' %} active{% endif %}" href="{{ '/' | relative_url }}">Extra packages</a>
          <a class="nav-link{% if page.url == '/status' or page.url == '/status.html' %} active{% endif %}" href="{{ '/status' | relative_url }}">CI status</a>
          <a class="nav-link" href="https://www.gap-system.org/packages/">Deposited packages</a>
          <a class="nav-link" href="https://www.gap-system.org/">Main GAP site</a>
          <a class="nav-link" href="https://github.com/gap-packages/gap-packages.github.io">GitHub repo</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <div class="page-toolbar">
        <p class="page-kicker">{{ site.title }}</p>
        <a class="edit-link" href="https://github.com/gap-packages/gap-packages.github.io/edit/master/{{ page.path }}">Edit this page</a>
      </div>

      <article class="content">
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p>Undeposited packages for the GAP computer algebra system.</p>
        <p>
          <a href="https://github.com/gap-packages">gap-packages on GitHub</a>
          <span aria-hidden="true">/</span>
          <a href="https://github.com/gap-system">gap-system on GitHub</a>
          <span aria-hidden="true">/</span>
          <a href="https://pages.github.com">Hosted by GitHub Pages</a>
        </p>
      </div>
    </footer>
  </body>
</html>
